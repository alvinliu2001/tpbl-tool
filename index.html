        const toMathBoldSerif = (t) => { const m = {'0':'𝟎','1':'𝟏','2':'𝟐','3':'𝟑','4':'𝟒','5':'𝟓','6':'𝟔','7':'𝟕','8':'𝟖','9':'𝟗','A':'𝐀','B':'𝐁','C':'𝐂','D':'𝐃','E':'𝐄','F':'𝐅','G':'𝐆','H':'𝐇','I':'𝐈','J':'𝐉','K':'𝐊','L':'𝐋','M':'𝐌','N':'𝐍','O':'𝐎','P':'𝐏','Q':'𝐐','R':'𝐑','S':'𝐒','T':'𝐓','U':'𝐔','V':'𝐕','W':'𝐖','X':'𝐗','Y':'𝐘','Z':'𝐙','a':'𝐚','b':'𝐛','c':'𝐜','d':'𝐝','e':'𝐞','f':'𝐟','g':'𝐠','h':'𝐡','i':'𝐢','j':'𝐣','k':'𝐤','l':'𝐥','m':'𝐦','n':'𝐧','o':'𝐨','p':'𝐩','q':'𝐪','r':'𝐫','s':'𝐬','t':'𝐭','u':'𝐮','v':'𝐯','w':'𝐰','x':'𝐱','y':'𝐲','z':'𝐳'}; return String(t).split('').map(c => m[c] || c).join(''); };
        const toMathBoldSans = (t) => { const m = {'0':'𝟬','1':'𝟭','2':'𝟮','3':'𝟯','4':'𝟰','5':'𝟱','6':'𝟲','7':'𝟳','8':'𝟴','9':'𝟵','A':'𝗔','B':'𝗕','C':'𝗖','D':'𝗗','E':'𝗘','F':'𝗙','G':'𝗚','H':'𝗛','I':'𝗜','J':'𝗝','K':'𝗞','L':'𝗟','M':'𝗠','N':'𝗡','O':'𝗢','P':'𝗣','Q':'𝗤','R':'𝗥','S':'𝗦','T':'𝗧','U':'𝗨','V':'𝐕','W':'𝗪','X':'𝗫','Y':'𝗬','Z':'𝗭','a':'𝗮','b':'𝗯','c':'𝗰','d':'𝗱','e':'𝗲','f':'𝗳','g':'𝗴','h':'𝗵','i':'𝗶','j':'𝗷','k':'𝗸','l':'𝗹','m':'𝗺','n':'𝗻','o':'𝗼','p':'𝗽','q':'𝗾','r':'𝗿','s':'𝘀','t':'𝘁','u':'𝘂','v':'𝘃','w':'𝘄','x':'𝘅','y':'𝘆','z':'𝘇'}; return String(t).split('').map(c => m[c] || c).join(''); };
        const parseDateLocal = (s) => { if(!s) return new Date(); const p = s.replace(/\//g, '-').split('-'); return new Date(p[0], p[1]-1, p[2]); };
        const getDayChi = (s) => { const d = parseDateLocal(s); return ['日','一','二','三','四','五','六'][d.getDay()]; };
        const formatMMDD = (s) => { const d = parseDateLocal(s); return `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };
        function normalizeTeamName(n) { n = String(n).trim(); if(TEAMS[n]) return n; for(let k in TEAMS) if(n.includes(k) || TEAMS[k].full.includes(n)) return k; return n; }
        const getValue = (id) => document.getElementById(id)?.value || "";
        const getTeam = (k) => TEAMS[k] || { full: k || "球隊", emoji: "", arena: "" };

        function getDatesForWeek(w) {
            const start = new Date("2025-12-01");
            let calcW = parseInt(w);
            if (calcW >= 19) calcW += 2; // 休賽兩週補償
            const target = new Date(start);
            target.setDate(start.getDate() + ((calcW - 8) * 7));
            const end = new Date(target); end.setDate(target.getDate() + 6);
            return { start: target.toISOString().split('T')[0], end: end.toISOString().split('T')[0] };
        }

        async function fetchRosterData() {
            try {
                const res = await fetch(CORS_PROXY + encodeURIComponent(GOOGLE_ROSTER_CSV_URL + '&t=' + Date.now()));
                const txt = await res.text();
                const rows = txt.split(/\r?\n/);
                const newData = {};
                for (let i = 1; i < rows.length; i++) {
                    let p = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    p = p.map(x => x.replace(/^"|"$/g, '').trim());
                    if (p.length < 3) continue;
                    const tk = normalizeTeamName(p[0]);
                    if (tk && p[2]) { if(!newData[tk]) newData[tk] = []; newData[tk].push({ name: p[2], num: p[1] }); }
                }
                if (Object.keys(newData).length > 0) ROSTERS = newData;
            } catch (e) { console.error("Roster Sync Fail", e); }
        }

        async function fetchScheduleData() {
            try {
                const res = await fetch(CORS_PROXY + encodeURIComponent(GOOGLE_SCHEDULE_CSV_URL + '&t=' + Date.now()));
                const txt = await res.text();
                const rows = txt.split(/\r?\n/);
                const newDB = [];
                for (let i = 1; i < rows.length; i++) {
                    let p = rows[i].split(','); p = p.map(x => x.replace(/^"|"$/g, '').trim());
                    if (p.length < 4) continue;
                    newDB.push({ id: i, date: p[0].replace(/\//g,'-'), time: p[1], home: normalizeTeamName(p[2]), away: normalizeTeamName(p[3]), arena: p[4] || "" });
                }
                if (newDB.length > 0) SEASON_SCHEDULE_DB = newDB;
            } catch (e) { console.error("Schedule Sync Fail", e); }
        }

        const createInput = (id, l, t="text", ph="", v="") => `<div><label class="block text-sm font-medium text-gray-700 mb-1">${l}</label><input type="${t}" id="${id}" class="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-brand-gold" placeholder="${ph}" value="${v}"></div>`;
        const createTextarea = (id, l, ph="", r=4) => `<div><label class="block text-sm font-medium text-gray-700 mb-1">${l}</label><textarea id="${id}" rows="${r}" class="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-brand-gold" placeholder="${ph}"></textarea></div>`;
        const createTeamSelect = (id, l) => `<div><label class="block text-sm font-medium text-gray-700 mb-1">${l}</label><select id="${id}" class="w-full p-2.5 border border-gray-300 rounded-md bg-white team-select"><option value="" disabled selected>選擇球隊</option>${TEAM_KEYS.map(k => `<option value="${k}">${k}</option>`).join('')}</select></div>`;
        const createNextGameBlock = (title) => `<div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mt-4"><p class="text-xs font-bold text-gray-500 mb-2 uppercase">${title}</p><div class="grid grid-cols-2 gap-4">${createInput('next_date','日期','date')}${createInput('next_game_num','場次','number')}<div><label class="block text-sm font-medium text-gray-700 mb-1">時間</label><select id="next_time" class="w-full p-2.5 border border-gray-300 rounded-md bg-white">${GAME_TIMES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div><div></div>${createTeamSelect('next_away','客隊')}${createTeamSelect('next_home','主隊')}</div></div>`;

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${mode}`)?.classList.add('active');
            const titles = { 'weekday_preview': '平日賽事預告', 'game_preview': '單場賽程預告', 'weekly_schedule': '每週賽程表', 'matchup_highlight': '賽前對戰亮點', 'final_score': '終場比分', 'game_highlight': '本場賽事精華', 'press_conf': '賽後記者會', 'potg': '單場最佳球員', 'local_player_highlight': '本土球員表現', 'weekly_standings': '每週戰績排行', 'top5': '本週五大好球', 'potw': '單週最佳球員', 'playoff_radar': '季後賽雷達戰報', 'nb_moments': 'Nothing But Moments', 'season_stats': '數據累計排行' };
            document.getElementById('title-text').innerText = titles[mode] || '請選擇功能';
            renderForm(mode);
            attachFormListeners();
            loadFromLocal();
        }

        function renderForm(mode) {
            const container = document.getElementById('dynamic-form');
            let html = '';
            if (mode === 'top5') {
                html = `${createInput('week_num','第幾週','number','7')}${createTextarea('top5_intro','引言文案','',2)}<div class="space-y-6 mt-6">${[1,2,3,4,5].map(i => `
                    <div class="p-4 border border-gray-200 rounded-xl bg-white shadow-sm space-y-4">
                        <div class="flex items-center gap-4 pb-3 border-b border-gray-100">
                            <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 text-gray-700 font-bold shrink-0 text-xs">${i}</span>
                            <div class="flex-1"><select id="top${i}_team" class="team-select w-full h-[40px] px-3 border border-gray-300 rounded-md text-sm"><option value="" disabled selected>選擇球隊</option>${TEAM_KEYS.map(k=>`<option value="${k}">${k}</option>`).join('')}</select></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1.5"><label class="text-[11px] font-bold text-gray-400 ml-1">球員 1</label><div class="flex items-center gap-2"><select id="top${i}_name1" data-team-select="top${i}_team" data-num-input="top${i}_num1" class="player-select disabled-input flex-1 h-[40px] px-3 border border-gray-300 rounded-md text-sm" disabled><option value="">先選擇球隊</option></select><input id="top${i}_num1" type="text" readonly class="w-14 h-[40px] border border-gray-300 rounded-md text-sm text-center bg-gray-100 font-bold"></div></div>
                            <div class="space-y-1.5"><label class="text-[11px] font-bold text-gray-400 ml-1">球員 2</label><div class="flex items-center gap-2"><select id="top${i}_name2" data-team-select="top${i}_team" data-num-input="top${i}_num2" class="player-select disabled-input flex-1 h-[40px] px-3 border border-gray-300 rounded-md text-sm" disabled><option value="">選填助攻者</option></select><input id="top${i}_num2" type="text" readonly class="w-14 h-[40px] border border-gray-300 rounded-md text-sm text-center bg-gray-100 font-bold"></div></div>
                        </div>
                    </div>`).join('')}</div>`;
            } else if (mode === 'press_conf') {
                html = `${createTeamSelect('pc_team_select','受訪球隊')}${createInput('pc_title','標題','text','🗣️ FACING THE STORM...')}${createTextarea('pc_quote','語錄')}${createTextarea('pc_content','內容')}${createNextGameBlock('下場賽事資訊')}`;
            } else if (mode === 'potg') {
                let saved = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'potg') || '{}');
                if (!saved.promo_text) saved.promo_text = '🀄️ 拚競技，超帶勁，加入競技麻將2 👉🏻 抽 TPBL 賽事門票';
                html = `${createInput('potg_game_num','場次','number')}<div class="grid grid-cols-2 gap-4">${createTeamSelect('potg_away','客隊')}${createTeamSelect('potg_home','主隊')}</div>${createNextGameBlock('下場賽事資訊')}<div class="mt-4"><label class="block text-sm font-medium text-gray-700 mb-1">底部活動文案</label><input type="text" id="promo_text" class="w-full p-2.5 border border-gray-300 rounded-md" value="${saved.promo_text}"></div>`;
            } else if (mode === 'playoff_radar') {
                html = `${createInput('playoff_ep','EP. 編號','text','01')}${createTextarea('playoff_intro','引言文案')}${createTextarea('playoff_content','關鍵戰況')}`;
            } else if (mode === 'final_score') {
                html = `${createInput('game_num','場次','number')}${createInput('match_title','標題')}${createTextarea('match_recap','回顧文案')}${createNextGameBlock('下場賽事')}`;
            } else {
                html = `<p class="text-gray-500">此模式表單建構中...</p>`;
            }
            container.innerHTML = html;
        }

        function attachFormListeners() {
            document.querySelectorAll('.team-select').forEach(s => {
                s.onchange = function() {
                    const tk = this.value;
                    document.querySelectorAll(`.player-select[data-team-select="${this.id}"]`).forEach(ps => {
                        ps.innerHTML = '<option value="">請選擇球員</option>';
                        if (tk && ROSTERS[tk]) {
                            ps.disabled = false; ps.classList.remove('disabled-input');
                            ROSTERS[tk].forEach(p => { const o = document.createElement('option'); o.value = p.name; o.text = p.name; o.dataset.num = p.num; ps.appendChild(o); });
                        }
                    });
                };
            });
            document.querySelectorAll('.player-select').forEach(ps => {
                ps.onchange = function() {
                    const ni = document.getElementById(this.dataset.numInput);
                    if (ni) ni.value = this.options[this.selectedIndex].dataset.num || "";
                };
            });
        }

        const getNextGameFormatted = () => {
            const d = getValue('next_date'); if(!d) return "";
            const dObj = parseDateLocal(d); if(isNaN(dObj.getTime())) return "";
            const mStr = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][dObj.getMonth()];
            const res = `📺 ${toMathBoldSans('NEXT GAME')}\n${toMathBoldSerif(mStr)}. ${toMathBoldSerif(dObj.getDate())}｜ ${toMathBoldSerif('Game')}${toMathBoldSerif(getValue('next_game_num'))}｜${toMathBoldSerif(getValue('next_time'))} ${getTeam(getValue('next_away')).full}（客） vs.${getTeam(getValue('next_home')).full}（主）`;
            return res;
        };

        function generateCopy() {
            let out = "";
            if (currentMode === 'top5') {
                out = `💣｜${toMathBoldSerif('TOP')}𝟓 ✦ ${toMathBoldSerif('Week')} ${toMathBoldSerif(getValue('week_num'))} 📢\n\n${getValue('top5_intro')}\n\n`;
                for (let i = 5; i >= 1; i--) {
                    const n1 = getValue(`top${i}_name1`);
                    if (n1) {
                        const t = getTeam(getValue(`top${i}_team`));
                        let ps = `＃${getValue(`top${i}_num1`)} ${n1}`;
                        if (getValue(`top${i}_name2`)) ps += ` & ＃${getValue(`top${i}_num2`)} ${getValue(`top${i}_name2`)}`;
                        out += `${['①','②','③','④','⑤'][i-1]} ${t.emoji} ${t.full}｜${ps}\n`;
                    }
                }
                out += `\n-\n\n${COMMON_TAGS} #TrueTisane`;
            } else if (currentMode === 'press_conf') {
                out = `🗣️${toMathBoldSerif(getValue('pc_title'))}\n\n💬「${getValue('pc_quote')}」\n\n${getValue('pc_content')}\n\n`;
                if(getValue('next_date')) {
                    const tn = getValue('pc_team_select') || "比賽";
                    const h = getTeam(getValue('next_home')); const a = getTeam(getValue('next_away'));
                    out += `-\n\n📌 下場${tn}\n▌${formatMMDD(getValue('next_date'))}（${getDayChi(getValue('next_date'))}）｜${getValue('next_time')}｜${a.full}（客） vs. ${h.full}（主）｜${h.arena}`;
                }
                out += `\n\n${COMMON_TAGS}`;
            } else if (currentMode === 'potg') {
                const h = getTeam(getValue('potg_home')); const a = getTeam(getValue('potg_away'));
                out = `❤️‍🔥 ${toMathBoldSerif('NOTHING BUT HIM')}\n\n${a.emoji} / ${h.emoji} #${toMathBoldSerif('單場最佳球員')}\n\n${getNextGameFormatted()}\n\n-\n\n${getValue('promo_text')}\n\n${COMMON_TAGS} #TPBL例行賽`;
            } else if (currentMode === 'playoff_radar') {
                out = `📡 ${toMathBoldSerif('TPBL PLAYOFFS RADAR')} ｜季後賽卡位戰雷達戰報 EP.“${getValue('playoff_ep')}”\n\n本週最新的「魔術數字預測戰報」出爐！\n${getValue('playoff_intro')}\n\n-\n\n⚠️ 本週關鍵戰況：\n${getValue('playoff_content')}\n\n-\n\n現在就留言告訴我們 💬 你認為誰能率先拿下季後賽門票？\n持續關注 TPBL 雷達戰報，掌握最即時的季後賽走勢！\n\n${COMMON_TAGS}`;
            } else if (currentMode === 'final_score') {
                out = `🔚 ${toMathBoldSerif('GAME')} ${toMathBoldSerif(getValue('game_num'))} ${toMathBoldSerif('FINAL')}｜${getValue('match_title')}\n\n${getValue('match_recap')}\n\n-\n\n${getNextGameFormatted()}\n\n${COMMON_TAGS} #TPBL例行賽`;
            }
            document.getElementById('output-text').value = out;
            saveToLocal();
        }

        function saveToLocal() { if(!currentMode) return; const data = {}; document.querySelectorAll('#dynamic-form input, #dynamic-form select, #dynamic-form textarea').forEach(el => { data[el.id] = el.value; }); localStorage.setItem(STORAGE_PREFIX + currentMode, JSON.stringify(data)); }
        function loadFromLocal() { const raw = localStorage.getItem(STORAGE_PREFIX + currentMode); if(raw) { const data = JSON.parse(raw); Object.keys(data).forEach(id => { const el = document.getElementById(id); if(el) { el.value = data[id]; if(el.classList.contains('team-select')) el.dispatchEvent(new Event('change')); } }); } }
        function clearCacheAndReset() { localStorage.removeItem(STORAGE_PREFIX + currentMode); switchMode(currentMode); }
        function copyToClipboard() { const el = document.getElementById('output-text'); el.select(); document.execCommand('copy'); const btn = document.getElementById('copy-text'); btn.innerText = "已複製！"; setTimeout(()=>btn.innerText="一鍵複製",2000); }

        window.onload = () => { fetchRosterData(); fetchScheduleData(); switchMode('game_preview'); };
    </script>
