        async function fetchRosterData() {
            try {
                const response = await fetch(CORS_PROXY + encodeURIComponent(GOOGLE_ROSTER_CSV_URL + '&t=' + Date.now()));
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/);
                const newRosters = {};
                for (let i = 1; i < rows.length; i++) {
                    const rowRaw = rows[i];
                    if (!rowRaw.trim()) continue;
                    let parts = rowRaw.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    parts = parts.map(p => p.replace(/^"|"$/g, '').trim());
                    if (parts.length < 3) continue;
                    const teamKey = normalizeTeamName(parts[0]);
                    if (teamKey && parts[2]) { if (!newRosters[teamKey]) newRosters[teamKey] = []; newRosters[teamKey].push({ name: parts[2], num: parts[1] }); }
                }
                if (Object.keys(newRosters).length > 0) ROSTERS = newRosters;
            } catch (e) { console.error("Roster sync failed", e); }
        }

                    let parts = rows[i].split(',');
                    parts = parts.map(p => p.replace(/^"|"$/g, '').trim());
                    if (parts.length < 4) continue;
                    newSchedule.push({ id: i, date: parts[0].replace(/\//g, '-'), time: parts[1], home: normalizeTeamName(parts[2]), away: normalizeTeamName(parts[3]), arena: parts[4] || "" });

        function attachFormListeners() {
            document.querySelectorAll('.team-select').forEach(s => {
                s.onchange = function() {
                    const tk = this.value;
                    document.querySelectorAll(`.player-select[data-team-select="${this.id}"]`).forEach(ps => {
                        ps.innerHTML = '<option value="">請選擇球員</option>';
                        if (tk && ROSTERS[tk]) {
                            ps.disabled = false; ps.classList.remove('disabled-input');
                            ROSTERS[tk].forEach(p => { const o = document.createElement('option'); o.value = p.name; o.text = p.name; o.dataset.num = p.num; ps.appendChild(o); });
                        }
                    });
                };
            });
            document.querySelectorAll('.player-select').forEach(ps => {
                ps.onchange = function() { const ni = document.getElementById(this.dataset.numInput); if (ni) ni.value = this.options[this.selectedIndex].dataset.num || ""; };
            });
        }

            } else if (currentMode === 'season_stats') {
                out = `📊 ${toMathBoldSerif('TPBL ALL-TIME REGULAR SEASON STATS')}｜${toMathBoldSerif(getValue('stats_title_suffix'))}\n\n${getValue('stats_content')}\n\n*數據統計至 ${formatDateFull(getValue('stats_cutoff_date'))}，包含 24-25 賽季\n\n-\n\n📌 ${getValue('stats_vote_month')}月MVP投票進行中 :\n🔗 投票連結｜${FIXED_VOTE_LINK}\n\n${COMMON_TAGS}`;
            } else if (currentMode === '100_reasons') {
                const t = getTeam(getValue('reasons_team')); const n = getValue('reasons_name');
                out = `【💭 一百種喜歡籃球的原因 Vol.${getValue('reasons_vol')}】\n\n${toMathBoldSerif('Q')}：你喜歡籃球嗎？\n${toMathBoldSerif('A')}：${getValue('reasons_quote')}${n ? ' — ' + t.emoji + ' ' + t.full + ' ' + n : ''}\n\n${getValue('reasons_content')}\n\n📝 完整故事請至 TPBL 官方網站\n${getValue('reasons_link')}\n\n#籃球怎能不愛 #NothingButLove #BasketballStory #HoopDreams`;
            } else if (currentMode === 'weekday_preview') {
                const h = getTeam(getValue('match_home')); const a = getTeam(getValue('match_away'));
                out = `🏀 ${toMathBoldSerif(getValue('promo_title'))}\n\n${getValue('promo_text')}\n\n-\n\n📌 小週末就看籃球：\n▌${formatMMDD(getValue('match_date'))}（${getDayChi(getValue('match_date'))}）｜${getValue('match_time')}｜${a.full}（客） vs. ${h.full}（主）｜${h.arena}\n\n-\n\n${getValue('promo_link')}\n\n${COMMON_TAGS}`;
            } else if (currentMode === 'matchup_highlight') {
                const h = getTeam(getValue('mu_home_team')); const a = getTeam(getValue('mu_away_team'));
                out = `⚔️ ${toMathBoldSerif('MATCH UP')}｜${getValue('mu_away_player')} ${a.emoji} vs. ${getValue('mu_home_player')} ${h.emoji}\n\n${getValue('matchup_content')}\n\n-\n\n📌 今天晚上看頂尖對決：\n▌${formatMMDD(getValue('next_date'))}（${getDayChi(getValue('next_date'))}）｜${getValue('next_time')}｜${TEAMS[getValue('next_away')].full}（客） vs. ${TEAMS[getValue('next_home')].full}（主）｜${TEAMS[getValue('next_home')].arena}\n\n${COMMON_TAGS}`;
            } else if (currentMode === 'weekly_schedule') {
                out = `⏰｜${toMathBoldSerif('WEEK')} ${toMathBoldSerif(getValue('week_num'))} ${toMathBoldSerif('SCHEDULE')} #每週賽程\n\n${getValue('week_intro')}\n\n-\n\n📌 本週賽事預告：\n`;
                const r = getDatesForWeek(getValue('week_num')); const gs = getGamesInDateRange(r.start, r.end);
                out += gs.map(g => `▌${formatMMDD(g.date)}（${getDayChi(g.date)}）｜${g.time}｜${TEAMS[g.away].full}（客） vs. ${TEAMS[g.home].full}（主）｜${g.arena}`).join('\n');
                out += `\n\n${COMMON_TAGS}`;
            } else if (currentMode === 'weekly_standings') {
                out = `📊｜${toMathBoldSerif('WEEK')} ${toMathBoldSerif(getValue('week_num'))} #球隊戰績排行\n\n${getValue('standings_content')}\n\n-\n\n📌 本週賽事預告：\n`;
                const r = getDatesForWeek(getValue('week_num')); const gs = getGamesInDateRange(r.start, r.end);
                out += gs.map(g => `▌${formatMMDD(g.date)}（${getDayChi(g.date)}）｜${g.time}｜${TEAMS[g.away].full}（客） vs. ${TEAMS[g.home].full}（主）｜${g.arena}`).join('\n');
                out += `\n\n${COMMON_TAGS}`;
            }

            document.getElementById('output-text').value = out;
            saveToLocal();
        }

        function copyToClipboard() { const el = document.getElementById("output-text"); el.select(); document.execCommand("copy"); const btn = document.getElementById("copy-text"); btn.innerText = "已複製！"; setTimeout(() => btn.innerText = "一鍵複製", 2000); }
        setInterval(saveToLocal, 5000);
        window.onload = () => { fetchAllData(); const last = localStorage.getItem('tpbl_last_mode') || 'game_preview'; switchMode(last); };
    </script>
</body>
</html>
